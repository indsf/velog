name: Update Blog Posts
# Signed-off-by: 이인호 <northfce@naver.com>

on:
  workflow_dispatch:
  schedule:
    # KST 00:00에 가깝게: UTC 15:07 (0분대 지연/드랍 회피용)
    - cron: '7 15 * * *'
    # KST 09:00에 가깝게: UTC 00:07
    - cron: '7 0 * * *'

permissions:
  contents: write

jobs:
  update_blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser gitpython

      - name: Run script
        run: python scripts/update_blog.py

      - name: Configure git identity
        run: |
          git config user.name "이인호"
          git config user.email "northfce@naver.com"

      - name: Commit changes (if any)
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update blog posts"

      - name: Push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git remote remove target 2>/dev/null || true
          git remote add target "https://${GH_PAT}@github.com/indsf/velog.git"
          git push target HEAD:main
